steps:
  - id: install
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && pnpm install --frozen-lockfile']

  - id: lint
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && pnpm run lint']

  # TODO: Vitest導入後に有効化
  # - id: test
  #   name: 'node:20'
  #   entrypoint: 'bash'
  #   args: ['-c', 'corepack enable && pnpm run test']

  - id: build
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable
        echo "SUPABASE_URL set: ${NEXT_PUBLIC_SUPABASE_URL:+yes}"
        NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
        NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
        NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
        NEXT_TELEMETRY_DISABLED=1 \
        pnpm run build
    secretEnv:
      - 'NEXT_PUBLIC_SUPABASE_URL'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - 'NEXT_PUBLIC_SITE_URL'

  - id: docker-auth
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['auth', 'configure-docker', 'asia-northeast1-docker.pkg.dev']

  - id: docker-build
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA', '.']

  - id: docker-push
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA']

  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--set-env-vars=NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL=$$NEXT_PUBLIC_SITE_URL'

availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest'
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: 'projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest'
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SITE_URL/versions/latest'
      env: 'NEXT_PUBLIC_SITE_URL'

substitutions:
  _REGION: 'asia-northeast1'
  _SERVICE_NAME: 'collaborative-novel'

options:
  logging: CLOUD_LOGGING_ONLY
